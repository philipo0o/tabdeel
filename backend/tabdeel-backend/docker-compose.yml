version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: biking_club_postgres
    restart: always
    environment:
      POSTGRES_DB: biking_club
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: biking_club_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@biking-club.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "8080:80"
    depends_on:
      - postgres
    networks:
      - app-network

  nest-app:
    build: .
    container_name: biking_club_app
    ports:
      - "3000:3000"
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    command: npm run start:dev
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: biking_club
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge