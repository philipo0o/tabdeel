services:
  # Database Service
  postgres:
    image: postgres:15
    container_name: tabdeel_postgres
    restart: always
    environment:
      POSTGRES_DB: biking_club
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tabdeel-network

  # PgAdmin Service (Optional - for DB management)
  pgadmin:
    image: dpage/pgadmin4
    container_name: tabdeel_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@tabdeel.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"
    depends_on:
      - postgres
    networks:
      - tabdeel-network

  # Backend Service (NestJS)
  backend:
    build:
      context: ./backend/tabdeel-backend
      dockerfile: Dockerfile
    container_name: tabdeel_backend
    ports:
      - "3001:3001"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=biking_club
      - PORT=3001
      - NODE_ENV=production
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production
      - JWT_EXPIRES_IN=24h
      - SMTP_USER=tabdeel.eg@gmail.com
      - SMTP_PASS=axhirquxozgwiecg
    depends_on:
      - postgres
    networks:
      - tabdeel-network

  # Frontend Service (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://76.13.15.98:3001
    container_name: tabdeel_frontend
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://76.13.15.98:3001
    depends_on:
      - backend
    networks:
      - tabdeel-network

volumes:
  postgres_data:

networks:
  tabdeel-network:
    driver: bridge
