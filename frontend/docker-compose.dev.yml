version: '3.8'

services:
  tabdeel-frontend-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:3001
      - PORT=3002
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    restart: unless-stopped