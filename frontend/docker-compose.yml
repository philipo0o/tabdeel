version: '3.8'

services:
  tabdeel-frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://tabdeel-backend:3001
    networks:
      - tabdeel-network
    depends_on:
      - tabdeel-backend
    restart: unless-stopped

  # If you want to include your backend here as well
  tabdeel-backend:
    image: tabdeel-backend:latest  # Replace with your backend image name
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/tabdeel
    networks:
      - tabdeel-network
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=tabdeel
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tabdeel-network
    restart: unless-stopped

networks:
  tabdeel-network:
    driver: bridge

volumes:
  postgres_data: